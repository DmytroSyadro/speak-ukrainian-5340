name: Speak-Ukrainian CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  BASE_URL: ${{ secrets.BASE_URL }}
  HEADLESS: true

permissions:
  contents: write
  pull-requests: write

jobs:
  lint-and-format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Code Formatting Check
        run: npx prettier --check .

      - name: Run Linter
        run: npm run lint

  test-and-report:
    needs: lint-and-format 
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ matrix.browser }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-${{ matrix.browser }}-

      - name: Install Playwright browser & deps
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Run Playwright tests
        run: npx playwright test --project=${{ matrix.browser }}
        continue-on-error: true

      - name: Download Allure history
        if: ${{ !cancelled() }}
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      - name: Generate Allure Report
        if: ${{ !cancelled() }}
        uses: simple-elf/allure-report-action@master
        with:
          allure_results: allure-results
          gh_pages: gh-pages
          allure_report: allure-report
          allure_history: allure-history
          subfolder: ${{ github.event_name == 'pull_request' && format('pr-{0}-{1}', github.event.number, matrix.browser) || format('main-{0}', matrix.browser) }}

      - name: Fix permissions
        if: ${{ !cancelled() }}
        run: sudo chmod -R 777 allure-history

      - name: Validate test results
        if: ${{ !cancelled() && github.event_name == 'pull_request' }}
        run: |
          SUMMARY_FILE="allure-history/pr-${{ github.event.number }}-${{ matrix.browser }}/widgets/summary.json"

          if [ ! -f "$SUMMARY_FILE" ]; then
            echo "⚠️ Summary file not found. Skipping."
            exit 0
          fi

          FAILED=$(jq '.statistic.failed' "$SUMMARY_FILE")
          BROKEN=$(jq '.statistic.broken' "$SUMMARY_FILE")

          echo "Browser: ${{ matrix.browser }}"
          echo "Failed: $FAILED"
          echo "Broken: $BROKEN"

          if [ "$FAILED" -gt 0 ] || [ "$BROKEN" -gt 0 ]; then
            echo "❌ Tests failed"
            exit 1
          fi

          echo "✅ All tests passed"

      - name: Deploy Allure Report
        if: ${{ success() }}
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history
          force_orphan: false # Змінено на false, щоб звіти не затирали один одного при паралельному пуші
      
      - name: Comment PR with report link
        if: ${{ success() && github.event_name == 'pull_request' }}
        uses: thollander/actions-comment-pull-request@v2
        with:
          comment_tag: allure-report-link-${{ matrix.browser }}
          message: |
            📊 **Allure Report for PR-${{ github.event.number }} (${{ matrix.browser }})**

            🔗 "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/pr-${{ github.event.number }}-${{ matrix.browser }}/"
